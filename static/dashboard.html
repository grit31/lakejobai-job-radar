<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS直聘自动化控制台</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --success-bg: #052e16;
    --warning-bg: #422006;
    --danger-bg: #450a0a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:1200px; margin:0 auto; padding:20px; }

  .header { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .header h1 { font-size:20px; }
  .header h1 span { color:var(--accent); }
  .status-bar { display:flex; gap:16px; font-size:13px; color:var(--text-muted); align-items:center; }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .status-dot.on { background:var(--green); }
  .status-dot.off { background:var(--red); }

  .nav { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); }
  .nav button { padding:10px 20px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; border-bottom:2px solid transparent; transition:all 0.15s; }
  .nav button:hover { color:var(--text); }
  .nav button.active { color:var(--accent); border-bottom-color:var(--accent); }

  .tab { display:none; }
  .tab.active { display:block; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  .card h3 { font-size:16px; margin-bottom:12px; }

  .btn { padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; border:none; transition:all 0.15s; font-weight:500; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover:not(:disabled) { background:var(--accent-hover); }
  .btn-success { background:var(--green); color:#000; }
  .btn-danger { background:var(--red); color:#fff; }
  .btn-secondary { background:var(--border); color:var(--text); }
  .btn-secondary:hover:not(:disabled) { background:#475569; }
  .btn-sm { padding:4px 12px; font-size:12px; }

  /* Search */
  .search-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .search-bar input, .search-bar select { background:#0f172a; border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-size:14px; outline:none; }
  .search-bar input:focus, .search-bar select:focus { border-color:var(--accent); }
  .search-bar input { flex:1; min-width:200px; }
  .search-bar input::placeholder { color:#64748b; }
  .search-bar select { min-width:100px; }

  .jobs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; }
  .job-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .job-card .title { font-size:15px; font-weight:600; margin-bottom:6px; }
  .job-card .title a { color:var(--text); text-decoration:none; }
  .job-card .title a:hover { color:var(--accent); }
  .job-card .meta { font-size:13px; color:var(--text-muted); display:flex; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  .job-card .salary { color:var(--red); font-weight:600; }
  .job-card .actions { display:flex; gap:6px; margin-top:10px; }
  .link-btn { display:inline-block; text-decoration:none; }
  .muted-note { color:var(--text-muted); font-size:12px; margin-top:8px; }

  .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:500; }
  .badge-pending { background:var(--border); color:var(--text-muted); }
  .badge-applied { background:var(--accent); color:#fff; }
  .badge-replied { background:var(--green); color:#000; }
  .badge-skipped { background:var(--border); color:var(--text-muted); }
  .badge-failed { background:var(--danger-bg); color:var(--red); }
  .badge-missing_url { background:var(--warning-bg); color:var(--orange); }

  /* Table */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); }
  th { color:var(--text-muted); font-weight:500; }
  tr:hover td { background:#1a2740; }

  /* Chat layout */
  .chat-container { display:flex; height:62vh; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .chat-list { width:300px; border-right:1px solid var(--border); overflow-y:auto; background:#0a1222; }
  .chat-list-item { padding:14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s; }
  .chat-list-item:hover { background:#1a2740; }
  .chat-list-item.active { background:var(--card); border-left:3px solid var(--accent); }
  .chat-list-item .name { font-size:14px; font-weight:600; }
  .chat-list-item .preview { font-size:12px; color:var(--text-muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-list-item .unread { display:inline-block; background:var(--red); color:#fff; font-size:11px; padding:1px 6px; border-radius:10px; margin-left:6px; }

  .chat-pane { flex:1; display:flex; flex-direction:column; }
  .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.6; word-wrap:break-word; position:relative; }
  .msg-hr { align-self:flex-start; background:var(--card); border-bottom-left-radius:4px; }
  .msg-me { align-self:flex-end; background:var(--accent); border-bottom-right-radius:4px; }
  .msg-me.ai { background:#1e40af; }
  .msg-me.read { border-left:3px solid var(--green); padding-left:11px; }
  .msg-me.unread { border-left:3px solid var(--border); padding-left:11px; }
  .msg-label { font-size:11px; color:var(--text-muted); margin-bottom:2px; }
  .ai-tag { font-size:10px; color:var(--orange); margin-left:4px; }

  .msg-bubble.anim-in { animation: msgSlideIn 0.35s ease-out; }
  @keyframes msgSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-bubble.anim-send { animation: msgSend 0.4s ease-out; }
  @keyframes msgSend {
    from { opacity: 0; transform: scale(0.9) translateX(20px); }
    to { opacity: 1; transform: scale(1) translateX(0); }
  }
  .typing-indicator { display:inline-flex; gap:4px; padding:8px 14px; }
  .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay:0.2s; }
  .typing-dot:nth-child(3) { animation-delay:0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { opacity:0.3; transform:translateY(0); }
    30% { opacity:1; transform:translateY(-4px); }
  }
  .msg-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
  .ai-tag { font-size:10px; color:var(--orange); margin-left:4px; }

  .chat-input-area { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
  .chat-input-area textarea { flex:1; background:#0f172a; border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:14px; resize:none; outline:none; min-height:44px; max-height:100px; font-family:inherit; }
  .chat-input-area textarea:focus { border-color:var(--accent); }

  .chat-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .chat-header .info { font-size:14px; }
  .chat-header .name { font-weight:600; }
  .chat-header .company { font-size:12px; color:var(--text-muted); }

  /* Settings */
  .setting-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .setting-row label { width:140px; font-size:14px; color:var(--text-muted); flex-shrink:0; }
  .setting-row input, .setting-row textarea, .setting-row select { flex:1; background:#0f172a; border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:14px; outline:none; font-family:inherit; }
  .setting-row textarea { min-height:80px; resize:vertical; }
  .setting-row input:focus, .setting-row textarea:focus, .setting-row select:focus { border-color:var(--accent); }

  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:16px; }
  .stat-card { background:#0f172a; border-radius:10px; padding:14px; text-align:center; }
  .stat-card .num { font-size:28px; font-weight:700; color:var(--accent); }
  .stat-card .lbl { font-size:12px; color:var(--text-muted); margin-top:4px; }

  .safety-banner { display:none; background:var(--danger-bg); border:1px solid var(--red); border-radius:8px; padding:12px 16px; margin-bottom:16px; color:var(--red); font-size:14px; }
  .safety-banner.show { display:block; }

  .empty { text-align:center; padding:40px; color:var(--text-muted); font-size:14px; }

  .spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:768px) {
    .chat-container { flex-direction:column; height:auto; }
    .chat-list { width:100%; max-height:200px; border-right:none; border-bottom:1px solid var(--border); }
    .jobs-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>BOSS直聘 · <span>自动化控制台</span></h1>
    <div class="status-bar">
      浏览器: <span class="status-dot off" id="browserDot"></span>
      <span id="browserStatus">未启动</span>
      &nbsp;       监控: <span class="status-dot off" id="monitorDot"></span>
      <span id="monitorStatus">未启动</span>
      <span id="pausedBadge" style="display:none;background:var(--orange);color:#000;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;">已暂停</span>
    </div>
  </div>

  <div class="safety-banner" id="safetyBanner"></div>

  <!-- Nav -->
  <nav class="nav">
    <button class="active" data-tab="search">岗位搜索</button>
    <button data-tab="applications">投递记录</button>
    <button data-tab="chat">聊天</button>
    <button data-tab="wechat">微信记录</button>
    <button data-tab="settings">设置</button>
  </nav>

  <!-- Tab 1: Search -->
  <div class="tab active" id="tab-search">
    <div class="card">
      <div class="search-bar">
        <input type="text" id="searchKeyword" placeholder="关键词" value="AI Agent">
        <select id="searchCity">
          <optgroup label="山东省">
            <option value="济南">济南</option>
            <option value="青岛">青岛</option>
            <option value="淄博" selected>淄博</option>
            <option value="潍坊">潍坊</option>
            <option value="烟台">烟台</option>
            <option value="济宁">济宁</option>
            <option value="临沂">临沂</option>
            <option value="泰安">泰安</option>
            <option value="威海">威海</option>
            <option value="东营">东营</option>
            <option value="滨州">滨州</option>
            <option value="菏泽">菏泽</option>
            <option value="枣庄">枣庄</option>
            <option value="日照">日照</option>
            <option value="聊城">聊城</option>
            <option value="德州">德州</option>
          </optgroup>
          <optgroup label="一线城市">
            <option value="北京">北京</option>
            <option value="上海">上海</option>
            <option value="广州">广州</option>
            <option value="深圳">深圳</option>
          </optgroup>
          <optgroup label="新一线城市">
            <option value="成都">成都</option>
            <option value="杭州">杭州</option>
            <option value="武汉">武汉</option>
            <option value="南京">南京</option>
            <option value="重庆">重庆</option>
            <option value="西安">西安</option>
            <option value="长沙">长沙</option>
            <option value="天津">天津</option>
            <option value="苏州">苏州</option>
            <option value="郑州">郑州</option>
            <option value="东莞">东莞</option>
            <option value="沈阳">沈阳</option>
            <option value="宁波">宁波</option>
            <option value="昆明">昆明</option>
          </optgroup>
          <optgroup label="其他省会城市">
            <option value="合肥">合肥</option>
            <option value="福州">福州</option>
            <option value="厦门">厦门</option>
            <option value="南昌">南昌</option>
            <option value="贵阳">贵阳</option>
            <option value="南宁">南宁</option>
            <option value="太原">太原</option>
            <option value="石家庄">石家庄</option>
            <option value="哈尔滨">哈尔滨</option>
            <option value="长春">长春</option>
            <option value="兰州">兰州</option>
            <option value="乌鲁木齐">乌鲁木齐</option>
            <option value="呼和浩特">呼和浩特</option>
            <option value="拉萨">拉萨</option>
            <option value="西宁">西宁</option>
            <option value="银川">银川</option>
            <option value="海口">海口</option>
            <option value="三亚">三亚</option>
          </optgroup>
          <option value="全国">全国</option>
        </select>
        <button class="btn btn-primary" id="btnSearch" onclick="doSearch()">搜索</button>
        <button class="btn btn-success" onclick="batchSearch()">一键搜索全部</button>
        <button class="btn btn-primary" onclick="batchApplyAll()">一键投递待投递</button>
      </div>
      <div id="searchStatus"></div>
    </div>
    <div class="jobs-grid" id="jobsGrid">
      <div class="empty">点击"搜索"获取岗位，或点击下方的"启动浏览器"后搜索</div>
    </div>
  </div>

  <!-- Tab 2: Applications -->
  <div class="tab" id="tab-applications">
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="statToday">0</div><div class="lbl">今日投递</div></div>
      <div class="stat-card"><div class="num" id="statPending">0</div><div class="lbl">待投递</div></div>
      <div class="stat-card"><div class="num" id="statReplied">0</div><div class="lbl">HR已回复</div></div>
      <div class="stat-card"><div class="num" id="statLimit">15</div><div class="lbl">每日上限</div></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <button class="btn btn-sm btn-secondary" onclick="loadApplications('')">全部</button>
        <button class="btn btn-sm btn-secondary" onclick="loadApplications('pending')">待投递</button>
        <button class="btn btn-sm btn-secondary" onclick="loadApplications('applied')">已投递</button>
        <button class="btn btn-sm btn-secondary" onclick="loadApplications('replied')">已回复</button>
        <button class="btn btn-sm btn-primary" onclick="batchApplyPending()">一键投递待投递</button>
      </div>
      <div id="applyProgress"></div>
      <div style="overflow-x:auto;">
        <table><thead><tr>
          <th>岗位</th><th>公司</th><th>薪资</th><th>城市</th><th>状态</th><th>操作</th>
        </tr></thead><tbody id="appTableBody"><tr><td colspan="6" class="empty">暂无数据</td></tr></tbody></table>
      </div>
    </div>
  </div>

  <!-- Tab 3: Chat -->
  <div class="tab" id="tab-chat">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <span style="font-size:13px;color:var(--text-muted);">💬 数据库会话记录（投递和监控时自动记录到此处）</span>
      <button class="btn btn-sm btn-secondary" onclick="navigateBrowserToChat()">📱 在浏览器中打开BOSS聊天页</button>
    </div>
    <div class="chat-container">
      <div class="chat-list" id="conversationList">
        <div class="empty" style="padding:20px;">暂无会话</div>
      </div>
      <div class="chat-pane">
        <div class="chat-header" id="chatHeader">
          <div class="info"><span class="name">选择会话</span><br><span class="company">点击左侧会话开始查看</span></div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm btn-secondary" id="btnAutoReplyToggle" onclick="toggleAutoReply()" disabled>暂停AI</button>
            <button class="btn btn-sm btn-primary" id="btnManualSend" onclick="sendManualMessage()" disabled>手动发送</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="empty">选择一个会话查看消息</div>
        </div>
        <div class="chat-input-area">
          <textarea id="chatInput" placeholder="输入消息..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendManualMessage();}"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab 4: 微信记录 -->
  <div class="tab" id="tab-wechat">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h3>已获取的 HR 微信</h3>
        <button class="btn btn-sm btn-secondary" onclick="loadWechatExchanges()">刷新</button>
      </div>
    </div>
    <div id="wechatExchangesList">
      <div class="empty">暂无微信记录，HR 发出微信号后会自动在这里显示</div>
    </div>
  </div>

  <!-- Tab 5: Settings -->
  <div class="tab" id="tab-settings">
    <div class="card">
      <h3>招呼语设置</h3>
      <div class="setting-row">
        <label>招呼语模板</label>
        <textarea id="setGreeting">您好，我对贵公司的{job_title}岗位很感兴趣，请问可以详细了解一下吗？</textarea>
      </div>
      <div class="setting-row">
        <label>AI回复风格</label>
        <select id="setStyle">
          <option value="professional">专业</option>
          <option value="casual">轻松</option>
          <option value="enthusiastic">热情</option>
        </select>
      </div>
    </div>
    <div class="card">
      <h3>频率限制</h3>
      <div class="setting-row">
        <label>每日投递上限</label>
        <input type="number" id="setDailyLimit" value="15" min="1" max="30">
      </div>
      <div class="setting-row">
        <label>回复间隔(秒)</label>
        <div style="display:flex;gap:8px;flex:1;">
          <input type="number" id="setMinDelay" value="30" min="10" max="300" style="flex:1;">
          <span style="color:var(--text-muted);line-height:40px;">至</span>
          <input type="number" id="setMaxDelay" value="120" min="20" max="600" style="flex:1;">
        </div>
      </div>
    </div>
    <div class="card">
      <h3>个人资料</h3>
      <div class="setting-row">
        <label>微信号</label>
        <input type="text" id="setWechat" placeholder="你的微信号，AI会在合适时引导HR添加">
      </div>
      <div class="setting-row">
        <label>简历摘要</label>
        <textarea id="setResume" placeholder="填入你的技能、项目经验等，AI会据此生成回复...">AI应用开发工程师，熟练Python/LangChain/RAG/Agent开发，有MCP、AutoGen等框架实战经验，做过多个企业级AI应用落地项目。</textarea>
      </div>
    </div>
    <div class="card">
      <h3>搜索关键词</h3>
      <div class="setting-row">
        <label>关键词（一行一个）</label>
        <textarea id="setSearchKeywords" rows="5" placeholder="AI Agent&#10;大模型开发&#10;AI产品经理&#10;RAG开发" style="flex:1;min-height:100px;"></textarea>
      </div>
    </div>
    <div class="card">
      <h3>AI模型配置</h3>
      <div class="setting-row">
        <label>平台</label>
        <select id="setAIPlatform" onchange="onPlatformChange()">
          <option value="">-- 选择平台 --</option>
          <option value="deepseek">DeepSeek</option>
          <option value="openrouter">OpenRouter</option>
          <option value="mimo">小米MiMo</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="setting-row">
        <label>API Key</label>
        <input type="password" id="setAIApiKey" placeholder="输入API Key">
        <span id="aiKeyStatus" style="font-size:12px;line-height:40px;margin-left:8px;"></span>
      </div>
      <div class="setting-row">
        <label>Base URL</label>
        <input type="text" id="setAIBaseUrl" placeholder="自动填充">
      </div>
      <div class="setting-row">
        <label>模型</label>
        <select id="setAIModel">
          <option value="">-- 选择模型 --</option>
        </select>
      </div>
      <div class="setting-row">
        <label>自动回复</label>
        <select id="setAutoReply">
          <option value="true">开启</option>
          <option value="false">关闭</option>
        </select>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
        选择平台后自动填充Base URL和可选模型列表
      </div>
    </div>
    <div class="card">
      <h3>系统控制</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-success" id="btnStart" onclick="startSystem()">启动浏览器</button>
        <button class="btn btn-danger" id="btnStop" onclick="stopSystem()">停止</button>
        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" id="btnRelogin" onclick="doRelogin()">重新扫码登录</button>
        <button class="btn btn-secondary btn-sm" onclick="manualHeartbeat()">心跳保活</button>
        <span id="sessionStatus" style="font-size:12px;color:var(--text-muted);line-height:30px;"></span>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let activeTab = 'search';
let activeConvId = null;
let ws = null;
let conversations = [];
let currentSearchJobs = [];
let searchInFlight = false;

// ── Init ──
document.querySelectorAll('.nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + activeTab).classList.add('active');
    if (activeTab === 'applications') loadApplications();
    if (activeTab === 'chat') loadConversations();
    if (activeTab === 'wechat') loadWechatExchanges();
  });
});

document.addEventListener('click', e => {
  const applyBtn = e.target.closest('[data-action="apply"]');
  if (applyBtn) {
    applyOne(applyBtn.dataset.url, applyBtn);
    return;
  }
  const skipBtn = e.target.closest('[data-action="skip"]');
  if (skipBtn) {
    skipJob(skipBtn.dataset.id);
  }
});

connectWS();
loadSettings();
refreshStatus();

// ── WebSocket ──
function connectWS() {
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + window.location.host + '/ws');
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      handleWS(msg);
    } catch(ex) {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => ws.close();
}

function handleWS(msg) {
  switch(msg.type) {
    case 'connected':
      updateStatusUI(msg.status);
      break;
    case 'search_complete':
      document.getElementById('searchStatus').innerHTML = `<div style="color:var(--green);margin-top:8px;">✅ 搜索完成，找到 ${msg.found} 条岗位</div>`;
      if (!searchInFlight && currentSearchJobs.length === 0) loadJobs();
      break;
    case 'apply_complete':
      if (currentSearchJobs.length && msg.job_url) {
        currentSearchJobs = currentSearchJobs.map(j => j.job_url === msg.job_url ? {...j, status:'applied', id:msg.job_id || j.id} : j);
        renderJobs(currentSearchJobs, '本次搜索暂无可展示岗位');
      } else {
        loadJobs();
      }
      refreshStatus();
      if (activeTab === 'applications') loadApplications();
      document.getElementById('searchStatus').innerHTML = '';
      break;
    case 'batch_complete':
      loadJobs();
      refreshStatus();
      if (activeTab === 'applications') loadApplications();
      break;
    case 'new_messages':
    case 'auto_reply_sent':
    case 'manual_message_sent':
    if (activeTab === 'chat') {
      loadConversations().then(() => {
        if (!activeConvId && conversations.length > 0) {
          selectConversation(conversations[0].id);
        }
      });
    }
      if (activeConvId) loadMessages(activeConvId);
      break;
    case 'safety_warning':
      showBanner(msg.message);
      break;
    case 'session_expired':
      showBanner(msg.message);
      document.getElementById('sessionStatus').textContent = '❌ 登录已过期';
      break;
    case 'relogin_ok':
      showBanner('扫码登录成功，session 已更新');
      document.getElementById('sessionStatus').textContent = '✅ 登录态正常';
      break;
    case 'settings_updated':
      break;
    case 'monitor_paused':
      document.getElementById('pausedBadge').style.display = 'inline';
      break;
    case 'monitor_resumed':
      document.getElementById('pausedBadge').style.display = 'none';
      break;
    case 'system':
      refreshStatus();
      break;
    case 'error':
      console.error(msg.message);
      break;
  }
}

// ── Status ──
function refreshStatus() {
  fetch('/api/status').then(r => r.json()).then(s => {
    updateStatusUI(s);
    document.getElementById('statToday').textContent = s.today_applications || 0;
    if (s.daily_stats) {
      document.getElementById('statLimit').textContent = '15';
    }
    document.getElementById('btnStart').disabled = s.browser_running;
  }).catch(() => {});
}

function updateStatusUI(s) {
  const bd = document.getElementById('browserDot');
  const md = document.getElementById('monitorDot');
  bd.className = 'status-dot ' + (s.browser_running ? 'on' : 'off');
  md.className = 'status-dot ' + (s.monitor_running ? 'on' : 'off');
  document.getElementById('browserStatus').textContent = s.browser_running ? '运行中' : '未启动';
  document.getElementById('monitorStatus').textContent = s.monitor_running ? (s.monitor_paused ? '已暂停' : '运行中') : '未启动';
  document.getElementById('pausedBadge').style.display = s.monitor_paused ? 'inline' : 'none';
  document.getElementById('btnStart').disabled = s.browser_running;
  document.getElementById('btnStop').disabled = !s.browser_running;
}

// ── System ──
function startSystem() {
  document.getElementById('btnStart').disabled = true;
  fetch('/api/system/start', {method:'POST'}).then(r => r.json()).then(d => {
    if (d.status === 'started') refreshStatus();
    else { alert('启动失败: ' + (d.message || '未知错误')); document.getElementById('btnStart').disabled = false; }
  }).catch(() => { document.getElementById('btnStart').disabled = false; });
}

function stopSystem() {
  fetch('/api/system/stop', {method:'POST'}).then(r => r.json()).then(() => refreshStatus());
}

function doRelogin() {
  if (!confirm('浏览器将打开BOSS直聘登录页，请在浏览器中扫码登录。确定继续？')) return;
  document.getElementById('btnRelogin').disabled = true;
  document.getElementById('btnRelogin').textContent = '等待扫码...';
  document.getElementById('sessionStatus').textContent = '请在打开的Firefox窗口中扫码登录';
  fetch('/api/system/relogin', {method:'POST'}).then(r => r.json()).then(d => {
    document.getElementById('btnRelogin').disabled = false;
    document.getElementById('btnRelogin').textContent = '重新扫码登录';
    if (d.status === 'ok') {
      document.getElementById('sessionStatus').textContent = '✅ ' + d.message;
      refreshStatus();
    } else {
      document.getElementById('sessionStatus').textContent = '❌ ' + (d.message || '登录失败');
    }
  }).catch(() => {
    document.getElementById('btnRelogin').disabled = false;
    document.getElementById('btnRelogin').textContent = '重新扫码登录';
  });
}

function manualHeartbeat() {
  document.getElementById('sessionStatus').textContent = '心跳检测中...';
  fetch('/api/system/heartbeat', {method:'POST'}).then(async r => {
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || d.message || '心跳检测失败');
    return d;
  }).then(d => {
    if (d.alive) {
      document.getElementById('sessionStatus').textContent = '✅ 登录态正常';
    }
  }).catch(err => {
    document.getElementById('sessionStatus').textContent = '❌ ' + (err.message || '登录已过期，请重新扫码登录');
  });
}

// ── Search ──
function doSearch() {
  searchInFlight = true;
  document.getElementById('searchStatus').innerHTML = '<div class="spinner"></div> 搜索中...';
  fetch('/api/jobs/search', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      keyword: document.getElementById('searchKeyword').value,
      city: document.getElementById('searchCity').value
    })
  }).then(r => r.json()).then(d => {
    searchInFlight = false;
    if (d.detail) {
      document.getElementById('searchStatus').innerHTML = `<div style="color:var(--red);margin-top:8px;">${esc(d.detail)}</div>`;
      return;
    }
    if (d.jobs_found === undefined || d.jobs_found === null) {
      document.getElementById('searchStatus').innerHTML = `<div style="color:var(--red);margin-top:8px;">搜索失败，请确认浏览器已启动</div>`;
      return;
    }
    currentSearchJobs = Array.isArray(d.jobs) ? d.jobs : [];
    const missingUrl = currentSearchJobs.filter(j => !j.job_url).length;
    const note = missingUrl ? `，${missingUrl} 条缺少链接无法投递` : '';
    document.getElementById('searchStatus').innerHTML = `<div style="color:var(--green);margin-top:8px;">找到 ${d.jobs_found} 条岗位，已保存/刷新 ${d.saved||0} 条${note}</div>`;
    if (currentSearchJobs.length) renderJobs(currentSearchJobs, '本次搜索暂无可展示岗位');
    else loadJobs();
  }).catch(err => {
    searchInFlight = false;
    document.getElementById('searchStatus').innerHTML = `<div style="color:var(--red);margin-top:8px;">搜索失败: ${esc(err.message)}</div>`;
  });
}

function loadJobs() {
  fetch('/api/jobs?limit=50').then(r => r.json()).then(d => {
    currentSearchJobs = [];
    renderJobs(d.jobs || [], '暂无岗位，先去搜索吧');
  });
}

function renderJobs(jobs, emptyText) {
  const grid = document.getElementById('jobsGrid');
  if (!jobs || jobs.length === 0) {
    grid.innerHTML = `<div class="empty">${esc(emptyText || '暂无岗位')}</div>`;
    document.getElementById('statPending').textContent = '0';
    return;
  }

  const statusLabels = {pending:'待投递',applied:'已投递',replied:'HR已回复',skipped:'已跳过',failed:'失败',missing_url:'缺少链接'};
  const statusBadges = {pending:'badge-pending',applied:'badge-applied',replied:'badge-replied',skipped:'badge-skipped',failed:'badge-failed',missing_url:'badge-missing_url'};
  let html = '';
  jobs.forEach(j => {
    const hasUrl = !!j.job_url;
    const status = j.status || (hasUrl ? 'pending' : 'missing_url');
    const statusBadge = statusBadges[status] || 'badge-pending';
    const titleText = j.job_title || j.title || '未知岗位';
    const title = hasUrl
      ? `<a href="${attr(j.job_url)}" target="_blank" rel="noopener noreferrer">${esc(titleText)}</a>`
      : esc(titleText);
    let actions = hasUrl
      ? `<a class="btn btn-sm btn-secondary link-btn" href="${attr(j.job_url)}" target="_blank" rel="noopener noreferrer">打开链接</a>`
      : `<span class="muted-note">缺少岗位链接</span>`;
    if ((status === 'pending' || status === 'failed') && hasUrl) {
      actions += `<button class="btn btn-sm btn-primary" data-action="apply" data-url="${attr(j.job_url)}">投递</button>`;
    }
    if (status === 'pending' && j.id) {
      actions += `<button class="btn btn-sm btn-secondary" data-action="skip" data-id="${attr(j.id)}">跳过</button>`;
    }
    html += `<div class="job-card">
      <div class="title">${title}</div>
      <div class="meta">
        ${j.company ? `<span>${esc(j.company)}</span>` : ''}
        ${j.salary ? `<span class="salary">${esc(j.salary)}</span>` : ''}
        ${j.city ? `<span>${esc(j.city)}</span>` : ''}
        ${j.experience ? `<span>${esc(j.experience)}</span>` : ''}
        ${j.education ? `<span>${esc(j.education)}</span>` : ''}
      </div>
      <span class="badge ${statusBadge}">${statusLabels[status]||status}</span>
      <div class="actions">${actions}</div>
    </div>`;
  });
  grid.innerHTML = html;
  document.getElementById('statPending').textContent = jobs.filter(j => (j.status || 'pending') === 'pending').length;
}

function applyOne(url, btn) {
  if (!url) {
    alert('缺少岗位链接，无法投递');
    return;
  }
  if (btn) {
    btn.disabled = true;
    btn.textContent = '投递中...';
  }
  fetch('/api/jobs/apply', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({job_url: url})
  }).then(r => r.json()).then(d => {
    if (d.success) {
      if (currentSearchJobs.length) {
        currentSearchJobs = currentSearchJobs.map(j => j.job_url === url ? {...j, status:'applied', id:d.application_id || j.id} : j);
        renderJobs(currentSearchJobs, '本次搜索暂无可展示岗位');
      } else {
        loadJobs();
      }
      refreshStatus();
      if (activeTab === 'applications') loadApplications();
    } else {
      alert(d.message || '投递失败');
      if (btn) { btn.disabled = false; btn.textContent = '投递'; }
    }
  }).catch(() => {
    if (btn) { btn.disabled = false; btn.textContent = '投递'; }
  });
}

function skipJob(id) {
  fetch('/api/jobs/' + id + '/skip', {method:'POST'}).then(() => {
    if (currentSearchJobs.length) {
      currentSearchJobs = currentSearchJobs.map(j => String(j.id) === String(id) ? {...j, status:'skipped'} : j);
      renderJobs(currentSearchJobs, '本次搜索暂无可展示岗位');
    } else {
      loadJobs();
    }
    if (activeTab === 'applications') loadApplications();
  });
}

// ── Applications ──
function loadApplications(status) {
  const url = status ? '/api/jobs?limit=100&status=' + status : '/api/jobs?limit=100';
  fetch(url).then(r => r.json()).then(d => {
    const tbody = document.getElementById('appTableBody');
    if (!d.jobs || d.jobs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无记录</td></tr>';
      return;
    }
    const statusLabels = {pending:'待投递',applied:'已投递',replied:'已回复',skipped:'已跳过',failed:'失败'};
    const statusBadges = {pending:'badge-pending',applied:'badge-applied',replied:'badge-replied',skipped:'badge-skipped',failed:'badge-failed'};
    let html = '';
    d.jobs.forEach(j => {
      const hasUrl = !!j.job_url;
      const title = hasUrl
        ? `<a href="${attr(j.job_url)}" target="_blank" rel="noopener noreferrer" style="color:var(--text);">${esc((j.job_title||'').substring(0,30))}</a>`
        : esc((j.job_title||'').substring(0,30));
      let actions = hasUrl ? `<a class="btn btn-sm btn-secondary link-btn" href="${attr(j.job_url)}" target="_blank" rel="noopener noreferrer">打开</a>` : '';
      if (j.status === 'pending' && hasUrl) {
        actions += `<button class="btn btn-sm btn-primary" data-action="apply" data-url="${attr(j.job_url)}">投递</button>`;
      }
      html += `<tr>
        <td>${title}</td>
        <td>${esc((j.company||'').substring(0,15))}</td>
        <td>${esc(j.salary||'')}</td>
        <td>${esc(j.city||'')}</td>
        <td><span class="badge ${statusBadges[j.status]||'badge-pending'}">${statusLabels[j.status]||j.status}</span></td>
        <td>${actions}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
  });
}

// ── Chat ──
function loadConversations() {
  return fetch('/api/conversations').then(r => r.json()).then(d => {
    conversations = d.conversations || [];
    const list = document.getElementById('conversationList');
    if (conversations.length === 0) {
      list.innerHTML = '<div class="empty" style="padding:20px;">暂无会话</div>';
      return;
    }
    let html = '';
    conversations.forEach(c => {
      const unread = c.unread_count > 0 ? `<span class="unread">${c.unread_count}</span>` : '';
      const activeClass = activeConvId === c.id ? ' active' : '';
      const interest = c.interest_level || '';
      const dotColor = interest === 'high' ? 'var(--green)' : interest === 'medium' ? 'var(--orange)' : 'var(--border)';
      const dotTitle = interest === 'high' ? '高兴趣' : interest === 'medium' ? '中兴趣' : interest === 'low' ? '低兴趣' : '';
      const dot = `<span title="${dotTitle}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};margin-right:6px;flex-shrink:0;"></span>`;
      html += `<div class="chat-list-item${activeClass}" onclick="selectConversation(${c.id})">
        <div class="name">${dot}${esc(c.hr_name||'未知')} ${unread}</div>
        <div class="preview">${esc((c.last_message_text||'').substring(0,40))}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${esc(c.hr_company||'')} · ${esc((c.job_title||'').substring(0,15))}</div>
      </div>`;
    });
    list.innerHTML = html;
  });
}

function selectConversation(id) {
  activeConvId = id;
  loadConversations();
  loadMessages(id);
  const conv = conversations.find(c => c.id === id);
  if (conv) {
    document.getElementById('chatHeader').innerHTML = `<div class="info">
      <span class="name">${esc(conv.hr_name||'未知')}</span><br>
      <span class="company">${esc(conv.hr_company||'')} · ${esc((conv.job_title||'').substring(0,20))}</span>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-sm btn-secondary" id="btnAutoReplyToggle" onclick="toggleAutoReply()">${conv.auto_reply_enabled ? '暂停AI回复' : '开启AI回复'}</button>
      <button class="btn btn-sm btn-primary" id="btnManualSend" onclick="sendManualMessage()">发送</button>
    </div>`;
    document.getElementById('btnManualSend').disabled = false;
    document.getElementById('btnAutoReplyToggle').disabled = false;
    syncConversation(id);
  }
}

function loadMessages(convId) {
  fetch('/api/conversations/' + convId + '/messages?limit=100').then(r => r.json()).then(d => {
    renderMessages(d.messages || []);
  });
}

function syncConversation(convId) {
  const pane = document.getElementById('chatMessages');
  if (!pane.querySelector('.msg-bubble')) {
    pane.innerHTML = '<div class="empty">正在从 BOSS 同步消息...</div>';
  }
  fetch('/api/conversations/' + convId + '/sync', {method:'POST'}).then(r => r.json()).then(d => {
    if (activeConvId !== convId) return;
    if (d.messages) renderMessages(d.messages);
  }).catch(() => {
    if (activeConvId === convId) loadMessages(convId);
  });
}

function renderMessages(msgs) {
  const pane = document.getElementById('chatMessages');
  if (!msgs || msgs.length === 0) {
    pane.innerHTML = '<div class="empty">暂无消息，投递后 HR 的消息会显示在这里</div>';
    return;
  }
  const oldCount = pane.querySelectorAll('.msg-bubble').length;
  const isNew = msgs.length > oldCount;
  let html = '';
  msgs.forEach((m, i) => {
    const cls = m.sender === 'me' ? (m.ai_generated ? 'msg-me ai' : 'msg-me') : 'msg-hr';
    let content = esc(m.content);
    const status = m.delivery_status || m.status || '';
    const readMark = content.match(/^(?:已读|未读|送达|发送失败|已发送)\s*/);
    if (readMark) {
      content = content.replace(/^(?:已读|未读|送达|发送失败|已发送)\s*/, '');
    }
    const state = status || (readMark ? readMark[0].trim() : '');
    const readCls = m.sender === 'me' && state ? (state === '已读' ? ' read' : ' unread') : '';
    const statusTag = state ? `<span class="ai-tag">${esc(state)}</span>` : '';
    const label = m.sender === 'hr' ? `<div class="msg-label">HR</div>` : `<div class="msg-label">我${m.ai_generated ? '<span class="ai-tag">AI代发</span>' : ''}${statusTag}</div>`;
    const anim = isNew && i >= oldCount ? (m.sender === 'me' ? ' anim-send' : ' anim-in') : '';
    html += `<div class="msg-bubble ${cls}${readCls}${anim}">${label}${content}</div>`;
  });
  pane.innerHTML = html;
  pane.scrollTop = pane.scrollHeight;
}

function sendManualMessage() {
  if (!activeConvId) return;
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  input.disabled = true;
  const btn = document.getElementById('btnManualSend');
  if (btn) { btn.disabled = true; btn.textContent = '发送中...'; }
  fetch('/api/conversations/' + activeConvId + '/send', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({content})
  }).then(r => {
    if (!r.ok) throw new Error('发送失败');
    return r.json();
  }).then(d => {
    loadMessages(activeConvId);
    loadConversations();
  }).catch(e => {
    alert('发送失败: ' + (e.message || '网络错误'));
    loadMessages(activeConvId);  // 尝试刷新
  }).finally(() => {
    input.disabled = false;
    input.focus();
    if (btn) { btn.disabled = false; btn.textContent = '发送'; }
  });
}

function toggleAutoReply() {
  if (!activeConvId) return;
  const conv = conversations.find(c => c.id === activeConvId);
  if (!conv) return;
  const endpoint = conv.auto_reply_enabled ? 'pause' : 'resume';
  fetch('/api/conversations/' + activeConvId + '/' + endpoint, {method:'POST'}).then(() => {
    loadConversations();
    if (activeConvId) selectConversation(activeConvId);
  });
  loadSettings();
}

// ── AI平台选择 ──

};

function onPlatformChange() {
  const plat = document.getElementById('setAIPlatform').value;
  const cfg = PLATFORMS[plat];
  if (!cfg) return;
  
  document.getElementById('setAIBaseUrl').value = cfg.baseUrl;
  
  const sel = document.getElementById('setAIModel');
  sel.innerHTML = '<option value="">-- 选择模型 --</option>';
  if (cfg.models.length) {
    cfg.models.forEach(m => {
      sel.innerHTML += `<option value="${m.v}">${m.t}</option>`;
    });
    sel.value = cfg.models[0].v;
  } else {
    sel.innerHTML += '<option value="">自定义模型名称</option>';
  }
}

// ── Settings ──
function loadSettings() {
  fetch('/api/settings').then(r => r.json()).then(d => {
    const s = d.settings || {};
    setVal('setGreeting', s.greeting_template || '');
    setVal('setStyle', s.ai_reply_style || 'professional');
    setVal('setDailyLimit', s.daily_apply_limit || '15');
    setVal('setMinDelay', s.min_reply_delay_sec || '30');
    setVal('setMaxDelay', s.max_reply_delay_sec || '120');
    setVal('setResume', s.resume_summary || '');
    setVal('setWechat', s.wechat_id || '');
    setVal('setSearchKeywords', (s.search_keywords || '').replace(/,/g, '\n'));
    setVal('setAutoReply', s.auto_reply_enabled || 'true');
    setVal('setAIBaseUrl', s.ai_base_url || '');
    setVal('setAIModel', s.ai_model || '');
    // API Key状态显示
    if (s.ai_key_configured === 'true') {
      document.getElementById('setAIApiKey').placeholder = '已配置（如需修改请输入新Key）';
      document.getElementById('aiKeyStatus').innerHTML = '<span style="color:var(--green);">已配置</span>';
    } else {
      document.getElementById('setAIApiKey').placeholder = '输入API Key，自动识别平台';
      document.getElementById('aiKeyStatus').innerHTML = '<span style="color:var(--orange);">未配置</span>';
    }
  });
}
  });
}

function saveSettings() {
  const data = {
    greeting_template: document.getElementById('setGreeting').value,
    ai_reply_style: document.getElementById('setStyle').value,
    daily_apply_limit: document.getElementById('setDailyLimit').value,
    min_reply_delay_sec: document.getElementById('setMinDelay').value,
    max_reply_delay_sec: document.getElementById('setMaxDelay').value,
    resume_summary: document.getElementById('setResume').value,
    wechat_id: document.getElementById('setWechat').value,
    search_keywords: document.getElementById('setSearchKeywords').value.replace(/\n/g, ','),
    auto_reply_enabled: document.getElementById('setAutoReply').value,
    ai_base_url: document.getElementById('setAIBaseUrl').value,
    ai_model: document.getElementById('setAIModel').value,
  };
  
  // API Key（如果输入了新的）
  const aiKey = document.getElementById('setAIApiKey').value;
  if (aiKey) {
    data.ai_api_key = aiKey;
  }
  
  fetch('/api/settings', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).then(r => r.json()).then(() => {
    alert('设置已保存');
    if (aiKey) {
      document.getElementById('aiKeyStatus').innerHTML = '<span style="color:var(--green);">已配置</span>';
      document.getElementById('setAIApiKey').placeholder = '已配置（如需修改请输入新Key）';
      document.getElementById('setAIApiKey').value = '';
    }
    refreshStatus();
  });
}

// ── Helpers ──
function esc(s) {
  if (s === undefined || s === null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function attr(s) {
  return esc(s).replace(/`/g, '&#96;');
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

function showBanner(msg) {
  const b = document.getElementById('safetyBanner');
  b.textContent = '⚠️ ' + msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 15000);
}

function navigateBrowserToChat() {
  fetch('/api/system/navigate-chat', {method:'POST'}).then(async r => {
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.status === 'ok') {
      alert('浏览器已跳转到BOSS直聘聊天页，请切换到Firefox窗口查看');
    } else {
      alert('跳转失败: ' + (d.message || '浏览器未启动，请先在设置中启动'));
    }
  }).catch(() => {
    alert('浏览器未启动，请先在设置页点击「启动浏览器」');
  });
}

function loadWechatExchanges() {
  fetch('/api/wechat-exchanges').then(r => r.json()).then(d => {
    const list = document.getElementById('wechatExchangesList');
    const records = d.exchanges || [];
    if (records.length === 0) {
      list.innerHTML = '<div class="empty">暂无微信记录，HR 发出微信号后会自动在这里显示</div>';
      return;
    }
    let html = '';
    records.forEach(r => {
      const name = esc(r.hr_name || '未知');
      const company = esc(r.hr_company || '');
      const title = esc((r.job_title || '').substring(0, 30));
      const wechat = esc(r.hr_wechat || '');
      const time = (r.wechat_shared_at || '').substring(0, 16);
      const interest = r.interest_level;
      const dotColor = interest === 'high' ? 'var(--green)' : interest === 'medium' ? 'var(--orange)' : 'var(--border)';

      // 岗位详情行
      let meta = [];
      if (r.city) meta.push(esc(r.city));
      if (r.salary) meta.push(esc(r.salary));
      if (r.experience) meta.push(esc(r.experience));
      if (r.education) meta.push(esc(r.education));
      const metaLine = meta.length ? meta.join(' · ') : '';
      const desc = (r.description || '').replace(/\\n/g, ' ').substring(0, 150);
      const companyLine = company ? `${company} · ${title}` : title;

      html += `<div class="card" style="padding:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <span title="${interest||''}" style="width:10px;height:10px;border-radius:50%;background:${dotColor};flex-shrink:0;"></span>
          <span style="font-size:15px;font-weight:600;">${name}</span>
          <span style="font-size:12px;color:var(--text-muted);">${companyLine}</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">
          ${time}${metaLine ? ' · ' + metaLine : ''}
        </div>
        ${desc ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;line-height:1.5;background:#0a1222;padding:8px;border-radius:6px;">${esc(desc)}</div>` : ''}
        <div style="display:flex;align-items:center;gap:8px;">
          <code style="background:#0a1222;padding:6px 12px;border-radius:6px;font-size:15px;color:var(--accent);">${wechat}</code>
          <button class="btn btn-sm btn-primary" onclick="copyWechat('${wechat.replace(/'/g,"\\'")}', this)">复制</button>
        </div>
      </div>`;
    });
    list.innerHTML = html;
  });
}

function copyWechat(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    btn.style.background = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
  });
}

// Periodic refresh
setInterval(() => {
  refreshStatus();
  if (activeTab === 'applications') loadApplications();
  if (activeTab === 'chat') {
    loadConversations();
    if (activeConvId) loadMessages(activeConvId);
  }
  if (activeTab === 'wechat') loadWechatExchanges();
}, 8000);

// ── 一键搜索 ──
async function batchSearch() {
  const keywords = (document.getElementById('setSearchKeywords').value || '')
    .replace(/\n/g, ',').split(',').map(k => k.trim()).filter(Boolean);
  if (!keywords.length) { alert('请先在设置中配置搜索关键词'); return; }
  const city = document.getElementById('searchCity').value;
  document.getElementById('searchStatus').innerHTML = `<div class="spinner"></div> 正在搜索 ${keywords.length} 个关键词...`;
  let allJobs = [];
  for (let i = 0; i < keywords.length; i++) {
    document.getElementById('searchStatus').innerHTML = `<div class="spinner"></div> [${i+1}/${keywords.length}] 搜索: ${keywords[i]}`;
    try {
      const resp = await fetch('/api/jobs/search', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keyword: keywords[i], city: city})
      });
      const data = await resp.json();
      if (data.jobs) allJobs = allJobs.concat(data.jobs);
    } catch(e) { console.error(e); }
  }
  currentSearchJobs = allJobs.filter((j, idx, arr) => arr.findIndex(x => x.job_url === j.job_url) === idx);
  renderJobs(currentSearchJobs, '未找到岗位');
  const pending = currentSearchJobs.filter(j => (j.status || 'pending') === 'pending');
  document.getElementById('searchStatus').innerHTML = `共找到 ${currentSearchJobs.length} 条，其中 ${pending.length} 条待投递`;
}

// ── 岗位搜索Tab的一键投递（投递刚搜索出来的）──
function batchApplyAll() {
  // 从搜索结果中筛选待投递岗位（排除已投递和已回复的，只要有链接就可以投递）
  const pending = currentSearchJobs.filter(j => 
    j.job_url && j.status !== 'applied' && j.status !== 'replied'
  );
  if (!pending.length) { alert('没有待投递的岗位，请先搜索岗位'); return; }
  if (!confirm(`确定投递 ${pending.length} 条岗位吗？`)) return;
  doBatchApply(pending.map(j => j.job_url), 'searchStatus');
}

// ── 投递记录Tab的一键投递（投递漏掉的）──
async function batchApplyPending() {
  const progressEl = document.getElementById('applyProgress');
  progressEl.innerHTML = `<div class="spinner"></div> 正在加载待投递岗位...`;
  
  try {
    const resp = await fetch('/api/jobs?status=pending&limit=200');
    const d = await resp.json();
    const pending = (d.jobs || []).filter(j => j.job_url);
    
    if (!pending.length) {
      progressEl.innerHTML = '没有待投递的岗位';
      return;
    }
    
    if (!confirm(`确定投递 ${pending.length} 条待投递岗位吗？`)) {
      progressEl.innerHTML = '';
      return;
    }
    
    doBatchApply(pending.map(j => j.job_url), 'applyProgress');
  } catch (e) {
    progressEl.innerHTML = `加载失败: ${e.message}`;
  }
}

// ── 通用批量投递函数 ──
function doBatchApply(urls, progressElementId) {
  let completed = 0;
  let success = 0;
  const total = urls.length;
  let cancelled = false;
  
  const progressEl = document.getElementById(progressElementId);
  
  // 更新进度显示
  function updateProgress() {
    if (cancelled) return;
    const pct = Math.round((completed / total) * 100);
    progressEl.innerHTML = `
      <div style="margin-bottom:8px;">投递进度: ${completed}/${total} (成功: ${success})</div>
      <div style="background:var(--border);border-radius:4px;height:20px;overflow:hidden;">
        <div style="background:var(--accent);height:100%;width:${pct}%;transition:width 0.3s;"></div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${pct}% - 正在投递...</div>
      <button class="btn btn-sm btn-danger" style="margin-top:8px;" onclick="cancelBatchApply()">取消</button>
    `;
  }
  
  // 取消按钮
  window.cancelBatchApply = function() {
    cancelled = true;
    progressEl.innerHTML = `
      <div style="color:var(--orange);">⚠️ 已取消投递: ${completed}/${total} (成功: ${success})</div>
    `;
    loadJobs(); refreshStatus();
    if (progressElementId === 'applyProgress') loadApplications();
  };
  
  // 逐个投递
  async function applyNext(index) {
    if (cancelled) return;
    if (index >= urls.length) {
      progressEl.innerHTML = `
        <div style="color:var(--green);">✅ 投递完成: ${success}/${total} 成功</div>
      `;
      loadJobs(); refreshStatus();
      if (progressElementId === 'applyProgress') loadApplications();
      return;
    }
    
    updateProgress();
    
    try {
      const resp = await fetch('/api/jobs/apply', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({job_url: urls[index]})
      });
      const result = await resp.json();
      if (result.success) success++;
    } catch (e) {
      console.error('投递失败:', e);
    }
    
    completed++;
    applyNext(index + 1);
  }
  
  applyNext(0);
}
</script>
